<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>thinkpro | Cloud Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --accent: #6366f1; 
            --accent-soft: rgba(99, 102, 241, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfcfd; 
            color: #0f172a;
            overscroll-behavior: none;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .card { 
            background: white; 
            border: 1px solid rgba(0,0,0,0.06); 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
            filter: brightness(1.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-slide-up { animation: slideUp 0.4s ease-out forwards; }

        .nav-active { color: var(--accent); position: relative; }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Auth Screen -->
    <div id="screen-auth" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-xl rotate-3">
                <i class="fas fa-cloud text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">thinkpro.</h1>
            <p id="auth-subtitle" class="text-slate-400 font-medium mb-10">Cloud Database Synchronized.</p>

            <form id="form-auth" class="space-y-4 text-left">
                <div id="field-name" class="hidden">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" id="input-name" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-300 transition-all" placeholder="Enter your name">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                    <input type="email" id="input-email" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-300 transition-all" placeholder="name@domain.com">
                </div>
                <button type="submit" id="btn-auth-submit" class="w-full btn-primary font-bold py-4 rounded-2xl mt-4 flex items-center justify-center space-x-2">
                    <span id="btn-auth-text">Sync with Cloud</span>
                    <i class="fas fa-sync text-xs opacity-50"></i>
                </button>
            </form>

            <button id="btn-toggle-auth" class="mt-8 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                New user? Create Cloud Account
            </button>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="hidden min-h-screen pb-20 lg:pb-0 lg:pl-72">
        
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 h-full w-72 bg-white border-r border-slate-100 p-8 hidden lg:flex flex-col z-50">
            <h2 class="text-2xl font-black text-indigo-600 mb-12 tracking-tighter">thinkpro.</h2>
            <nav class="flex-1 space-y-2">
                <button onclick="router.navigate('feed')" id="nav-d-feed" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-house"></i><span>Home Feed</span>
                </button>
                <button onclick="router.navigate('discover')" id="nav-d-discover" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-search"></i><span>Discover</span>
                </button>
                <button onclick="router.navigate('profile')" id="nav-d-profile" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-user"></i><span>My Profile</span>
                </button>
            </nav>
            
            <div class="mt-auto p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Database Status</p>
                <div id="server-status" class="text-[10px] text-green-500 font-mono">Cloud Sync: Active</div>
            </div>

            <button onclick="app.logout()" class="p-4 text-slate-400 hover:text-red-500 font-bold flex items-center space-x-4 transition-colors">
                <i class="fas fa-sign-out-alt"></i><span>Sign Out</span>
            </button>
        </aside>

        <!-- Dynamic Header -->
        <header class="sticky top-0 z-40 glass px-6 py-4 flex items-center justify-between">
            <h1 id="view-title" class="text-xl font-extrabold tracking-tight capitalize">Home Feed</h1>
            <div class="flex items-center space-x-3">
                <div class="hidden sm:flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-full">
                    <i class="fas fa-globe text-indigo-400 text-[10px]"></i>
                    <span id="latency-indicator" class="text-[10px] font-black text-white uppercase tracking-tighter">Live</span>
                </div>
                <img id="user-avatar-small" class="w-9 h-9 rounded-xl object-cover bg-slate-100 border border-slate-100">
            </div>
        </header>

        <!-- Main Container -->
        <main id="view-container" class="max-w-2xl mx-auto p-4 md:p-8">
            <div id="screen-feed" class="anim-slide-up space-y-6">
                <div class="card p-5 rounded-[2rem] shadow-sm">
                    <div class="flex space-x-4">
                        <img id="composer-avatar" class="w-12 h-12 rounded-2xl object-cover bg-slate-50">
                        <div class="flex-1">
                            <textarea id="post-input" class="w-full border-none resize-none py-2 text-lg font-medium bg-transparent outline-none no-scrollbar" placeholder="Sync your thoughts..." rows="1"></textarea>
                            <div id="image-preview-container" class="hidden mt-3 relative inline-block">
                                <img id="post-image-preview" class="max-h-48 rounded-2xl border border-slate-100">
                                <button onclick="feedManager.clearImage()" class="absolute -top-2 -right-2 bg-black/50 text-white w-6 h-6 rounded-full text-xs"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                <div class="flex space-x-4 text-slate-400">
                                    <label class="cursor-pointer hover:text-indigo-600 transition-colors">
                                        <i class="far fa-image"></i>
                                        <input type="file" id="post-image-input" class="hidden" accept="image/*">
                                    </label>
                                </div>
                                <button onclick="feedManager.createPost()" id="btn-post" class="btn-primary px-8 py-2.5 rounded-xl font-bold text-sm">Post to Cloud</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="feed-list" class="space-y-6"></div>
            </div>

            <div id="screen-profile" class="hidden anim-slide-up">
                <div class="card rounded-[2.5rem] overflow-hidden">
                    <div class="h-32 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
                    <div class="px-8 pb-10 flex flex-col items-center -mt-12">
                        <img id="profile-img" class="w-28 h-28 rounded-[2.2rem] border-8 border-white shadow-xl bg-white object-cover">
                        <h2 id="profile-name" class="text-2xl font-black mt-4 text-slate-900"></h2>
                        <p id="profile-handle" class="text-indigo-600 font-bold text-sm mb-6"></p>
                        <div class="grid grid-cols-3 gap-8 w-full border-t border-slate-50 pt-8 mt-2">
                            <div class="text-center">
                                <p id="stat-posts" class="font-black text-xl text-slate-800">0</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">Posts</p>
                            </div>
                            <div class="text-center">
                                <p class="font-black text-xl text-slate-800">Global</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">Reach</p>
                            </div>
                            <div class="text-center">
                                <p class="font-black text-xl text-slate-800" id="user-id-display">...</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">User ID</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-discover" class="hidden anim-slide-up space-y-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="search-input" placeholder="Search global users..." class="w-full pl-14 pr-6 py-5 bg-white border border-slate-100 rounded-[2rem] shadow-sm outline-none focus:border-indigo-300 transition-all">
                </div>
                <div id="user-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>

        <!-- Nav (Mobile) -->
        <nav class="fixed bottom-0 left-0 right-0 glass px-6 py-4 flex justify-around items-center lg:hidden z-50">
            <button onclick="router.navigate('feed')" id="nav-m-feed" class="p-3 text-slate-400"><i class="fas fa-house text-xl"></i></button>
            <button onclick="router.navigate('discover')" id="nav-m-discover" class="p-3 text-slate-400"><i class="fas fa-search text-xl"></i></button>
            <button onclick="router.navigate('profile')" id="nav-m-profile" class="p-3 text-slate-400"><i class="fas fa-user text-xl"></i></button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3">
            <span id="toast-msg" class="text-sm font-bold"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app_id = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);

        // State Management
        const state = {
            user: null,
            userData: null,
            isSignup: false,
            currentPostImage: null,
            posts: []
        };

        // Utility Functions
        const notify = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, 10px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 3000);
        };

        // UI Handlers
        window.app = {
            logout: async () => {
                await signOut(auth);
                location.reload();
            }
        };

        window.router = {
            navigate: (view) => {
                document.getElementById('view-title').innerText = view === 'feed' ? 'Home Feed' : view;
                ['feed', 'profile', 'discover'].forEach(v => {
                    document.getElementById(`screen-${v}`).classList.toggle('hidden', v !== view);
                    const m = document.getElementById(`nav-m-${v}`);
                    const d = document.getElementById(`nav-d-${v}`);
                    if(m) { m.classList.toggle('nav-active', v === view); m.classList.toggle('text-slate-400', v !== view); }
                    if(d) { d.classList.toggle('nav-active', v === view); d.classList.toggle('text-indigo-600', v === view); }
                });
            }
        };

        // Feed Logic
        window.feedManager = {
            createPost: async () => {
                if (!state.user) return;
                const input = document.getElementById('post-input');
                const text = input.value.trim();
                if (!text && !state.currentPostImage) return;

                const btn = document.getElementById('btn-post');
                btn.disabled = true;
                btn.innerText = "Syncing...";

                try {
                    await addDoc(collection(db, 'artifacts', app_id, 'public', 'data', 'posts'), {
                        text,
                        image: state.currentPostImage,
                        author: state.userData.name,
                        authorId: state.user.uid,
                        avatar: state.userData.avatar,
                        createdAt: serverTimestamp(),
                        likes: 0
                    });
                    input.value = '';
                    window.feedManager.clearImage();
                    notify("Persisted to Cloud Database");
                } catch (e) {
                    notify("Sync error. Try again.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Post to Cloud";
                }
            },
            clearImage: () => {
                state.currentPostImage = null;
                document.getElementById('image-preview-container').classList.add('hidden');
                document.getElementById('post-image-input').value = '';
            },
            render: (posts) => {
                const container = document.getElementById('feed-list');
                if (posts.length === 0) {
                    container.innerHTML = `<div class="py-20 text-center text-slate-300 font-bold italic">Global cloud feed is empty.</div>`;
                    return;
                }

                container.innerHTML = posts.map(p => `
                    <div class="card p-6 rounded-[2.5rem] anim-slide-up flex flex-col space-y-4">
                        <div class="flex items-center space-x-3">
                            <img src="${p.avatar}" class="w-10 h-10 rounded-xl object-cover bg-slate-50">
                            <div>
                                <h4 class="font-bold text-sm text-slate-900">${p.author}</h4>
                                <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">${p.createdAt?.toDate().toLocaleTimeString() || 'Just now'}</p>
                            </div>
                        </div>
                        <p class="text-slate-600 leading-relaxed font-medium">${p.text}</p>
                        ${p.image ? `<img src="${p.image}" class="w-full rounded-2xl border border-slate-50 max-h-96 object-cover">` : ''}
                        <div class="flex items-center space-x-6 pt-4 border-t border-slate-50">
                            <button class="flex items-center space-x-2 text-slate-400"><i class="far fa-heart"></i><span class="text-xs font-bold">${p.likes || 0}</span></button>
                            <button class="flex items-center space-x-2 text-slate-400 opacity-30"><i class="fas fa-cloud-upload-alt"></i><span class="text-[8px] font-mono">ID: ${p.id.slice(-4)}</span></button>
                        </div>
                    </div>
                `).join('');
                
                // Update profile stats if on profile
                const myPosts = posts.filter(p => p.authorId === state.user.uid).length;
                document.getElementById('stat-posts').innerText = myPosts;
            }
        };

        // Authentication & Sync Core
        const initSession = async () => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    state.user = user;
                    const userRef = doc(db, 'artifacts', app_id, 'public', 'data', 'users', user.uid);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        state.userData = userSnap.data();
                        finishAuth();
                    } else if (state.isSignup) {
                        const name = document.getElementById('input-name').value || 'New Thinker';
                        const userData = {
                            name,
                            avatar: `https://api.dicebear.com/7.x/notionists/svg?seed=${user.uid}`,
                            createdAt: serverTimestamp()
                        };
                        await setDoc(userRef, userData);
                        state.userData = userData;
                        finishAuth();
                    } else {
                        // Accidental anon login without registration data
                        await signOut(auth);
                        notify("Account not found. Please register.");
                        location.reload();
                    }
                }
            });
        };

        const finishAuth = () => {
            document.getElementById('screen-auth').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('screen-auth').style.display = 'none';
                document.getElementById('app-shell').classList.remove('hidden');
                updateUserUI();
                startDatabaseListeners();
            }, 500);
        };

        const updateUserUI = () => {
            const u = state.userData;
            document.getElementById('user-avatar-small').src = u.avatar;
            document.getElementById('composer-avatar').src = u.avatar;
            document.getElementById('profile-img').src = u.avatar;
            document.getElementById('profile-name').innerText = u.name;
            document.getElementById('profile-handle').innerText = `@cloud_user`;
            document.getElementById('user-id-display').innerText = state.user.uid.slice(0, 5);
        };

        const startDatabaseListeners = () => {
            // Live Posts Listener
            const postsQuery = query(collection(db, 'artifacts', app_id, 'public', 'data', 'posts'), orderBy('createdAt', 'desc'));
            onSnapshot(postsQuery, (snapshot) => {
                const posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.feedManager.render(posts);
            }, (error) => {
                console.error("Firestore error:", error);
            });

            // Global Users Search listener
            onSnapshot(collection(db, 'artifacts', app_id, 'public', 'data', 'users'), (snapshot) => {
                state.globalUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }, (error) => console.error(error));
        };

        // Form Event Listeners
        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('btn-auth-submit');
            submitBtn.disabled = true;
            submitBtn.innerText = "Authenticating...";

            try {
                // For simplicity in this demo, we use Anonymous auth to persist unique IDs across devices 
                // in a real app, this would use Email/Password
                await signInAnonymously(auth);
            } catch (err) {
                notify("Connection failed. Check network.");
                submitBtn.disabled = false;
            }
        };

        document.getElementById('btn-toggle-auth').onclick = () => {
            state.isSignup = !state.isSignup;
            document.getElementById('field-name').classList.toggle('hidden', !state.isSignup);
            document.getElementById('btn-auth-text').innerText = state.isSignup ? 'Create Cloud Account' : 'Sync with Cloud';
            document.getElementById('btn-toggle-auth').innerText = state.isSignup ? 'Existing Profile? Login' : 'New user? Create Cloud Account';
        };

        document.getElementById('post-image-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.currentPostImage = ev.target.result;
                document.getElementById('post-image-preview').src = ev.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('search-input').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            if (!state.globalUsers) return;
            const results = state.globalUsers.filter(u => u.name.toLowerCase().includes(q));
            document.getElementById('user-results').innerHTML = results.map(u => `
                <div class="card p-4 rounded-3xl flex items-center space-x-3">
                    <img src="${u.avatar}" class="w-10 h-10 rounded-xl">
                    <div>
                        <p class="font-bold text-sm">${u.name}</p>
                        <p class="text-[10px] text-slate-400 font-mono">${u.id.slice(0,8)}</p>
                    </div>
                </div>
            `).join('');
        };

        document.getElementById('post-input').oninput = function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        };

        // Initialize
        initSession();

    </script>
</body>
</html>
