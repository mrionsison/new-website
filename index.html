<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True News | Global Perspective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #c2410c;
            --bg: #ffffff;
            --text: #111827;
            --card-bg: #f9fafb;
        }

        .dark-mode {
            --bg: #0f172a;
            --text: #f1f5f9;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        .serif { font-family: 'Playfair Display', serif; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .breaking-ticker {
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-content {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .category-pill.active {
            background-color: var(--primary);
            color: white;
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 bg-opacity-90 backdrop-blur-md bg-[var(--bg)]">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
                <div class="hidden md:flex text-xs font-bold uppercase tracking-widest opacity-60" id="currentDate"></div>
            </div>
            
            <h1 class="serif text-3xl md:text-5xl font-black tracking-tighter text-orange-700">TRUE NEWS</h1>
            
            <div class="flex items-center gap-4">
                <button class="p-2"><i class="fas fa-search"></i></button>
                <button class="bg-orange-700 text-white px-4 py-1.5 rounded text-sm font-bold hidden sm:block">SUBSCRIBE</button>
            </div>
        </div>

        <!-- Categories -->
        <nav class="container mx-auto px-4 py-2 overflow-x-auto no-scrollbar flex gap-6 text-sm font-bold uppercase tracking-tight whitespace-nowrap border-t border-gray-100 dark:border-gray-800">
            <button class="category-pill active py-1 px-3 rounded" onclick="filterNews('all')">Latest</button>
            <button class="category-pill py-1 px-3 rounded" onclick="filterNews('world')">World</button>
            <button class="category-pill py-1 px-3 rounded" onclick="filterNews('tech')">Tech</button>
            <button class="category-pill py-1 px-3 rounded" onclick="filterNews('finance')">Finance</button>
            <button class="category-pill py-1 px-3 rounded" onclick="filterNews('science')">Science</button>
            <button class="category-pill py-1 px-3 rounded" onclick="filterNews('health')">Health</button>
        </nav>
    </header>

    <!-- Breaking News Ticker -->
    <div class="bg-orange-700 text-white py-2 overflow-hidden relative">
        <div class="container mx-auto px-4 flex">
            <span class="font-bold uppercase text-xs mr-4 bg-black px-2 py-0.5 whitespace-nowrap z-10">Breaking</span>
            <div class="breaking-ticker flex-1">
                <div class="ticker-content text-sm italic" id="tickerText">
                    Loading global headlines...
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Featured Section -->
        <section id="featured-news" class="mb-12">
            <!-- Dynamic Featured Content -->
        </section>

        <hr class="mb-12 border-gray-200 dark:border-gray-800">

        <!-- News Grid -->
        <section id="news-container" class="news-grid">
            <!-- Dynamic News Cards -->
        </section>

        <!-- Load More -->
        <div class="flex justify-center mt-16 mb-8">
            <button onclick="loadMoreNews()" class="border-2 border-orange-700 text-orange-700 dark:text-orange-500 dark:border-orange-500 px-8 py-3 font-bold hover:bg-orange-700 hover:text-white transition-all">
                LOAD MORE STORIES
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-100 dark:bg-gray-900 py-12 border-t border-gray-200 dark:border-gray-800">
        <div class="container mx-auto px-4 text-center">
            <h2 class="serif text-2xl font-bold mb-4">TRUE NEWS</h2>
            <p class="text-sm opacity-60 mb-8 max-w-md mx-auto">The world's most trusted source for unbiased, real-time reporting from every corner of the globe.</p>
            <div class="flex justify-center gap-6 mb-8">
                <a href="#" class="hover:text-orange-600"><i class="fab fa-twitter"></i></a>
                <a href="#" class="hover:text-orange-600"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-orange-600"><i class="fab fa-instagram"></i></a>
            </div>
            <p class="text-xs opacity-40">&copy; 2024 True News Network. No API Key Required.</p>
        </div>
    </footer>

    <!-- Article Modal -->
    <div id="articleModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-[var(--bg)] w-full max-w-3xl max-h-[90vh] overflow-y-auto relative rounded-lg shadow-2xl p-6 md:p-10">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl opacity-50 hover:opacity-100">&times;</button>
            <div id="modalContent">
                <!-- Dynamic Article Content -->
            </div>
        </div>
    </div>

    <script>
        // News Generator Engine
        const categories = {
            world: ["London", "Tokyo", "New York", "Paris", "Berlin", "Sydney", "Dubai"],
            tech: ["AI", "Quantum", "Silicon Valley", "Smartphones", "Cybersecurity", "SpaceX", "Metaverse"],
            finance: ["Market", "Stocks", "Crypto", "Inflation", "Oil", "Real Estate", "Banking"],
            science: ["Astronomy", "Biology", "Physics", "Climate", "Genetics", "NASA", "Energy"],
            health: ["Wellness", "Nutrition", "Mental Health", "Vaccines", "Medicine", "Longevity"]
        };

        const verbs = ["Unveils", "Discovers", "Declares", "Approves", "Reports", "Signals", "Protests", "Challenges", "Transforms"];
        const subjects = ["Major Breakthrough", "New Policy", "Rising Costs", "Global Summit", "Hidden Structure", "Strategic Shift", "Future Forecast"];

        let currentCategory = 'all';
        let newsData = [];

        // Utility: Generate a random article
        function generateArticle(id, forceCategory = null) {
            const catKeys = Object.keys(categories);
            const cat = forceCategory || catKeys[Math.floor(Math.random() * catKeys.length)];
            const subCat = categories[cat][Math.floor(Math.random() * categories[cat].length)];
            const verb = verbs[Math.floor(Math.random() * verbs.length)];
            const subject = subjects[Math.floor(Math.random() * subjects.length)];
            
            const title = `${subCat} ${verb} ${subject}: What You Need To Know Today`;
            const date = new Date(Date.now() - Math.floor(Math.random() * 100000000)).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            return {
                id,
                title,
                category: cat,
                date,
                author: "TNN Editorial Staff",
                image: `https://picsum.photos/seed/${id}/800/500`,
                summary: "In a rapidly evolving landscape, recent developments have sparked intense debate among experts and officials. This comprehensive report explores the underlying factors and potential long-term consequences of today's announcement.",
                content: `<p class="mb-4">Today's announcement from ${subCat} marks a significant turning point in the ${cat} sector. Observers suggest that the ${subject} could have far-reaching implications for the global community.</p>
                          <p class="mb-4">"We are looking at a fundamental shift in how we approach these challenges," said a lead strategist. The data indicates that since early last year, trends have been moving steadily toward this moment.</p>
                          <p class="mb-4">As the situation develops, stay tuned to True News for in-depth analysis and live updates from our correspondents on the ground.</p>`
            };
        }

        // Initialize News
        function initNews(count = 20) {
            newsData = [];
            for (let i = 0; i < count; i++) {
                newsData.push(generateArticle(i));
            }
            render();
        }

        function loadMoreNews() {
            const currentCount = newsData.length;
            for (let i = 0; i < 10; i++) {
                newsData.push(generateArticle(currentCount + i));
            }
            render();
        }

        function filterNews(category) {
            currentCategory = category;
            
            // Update UI
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.toLowerCase() === category || (category === 'all' && btn.innerText === 'Latest')) {
                    btn.classList.add('active');
                }
            });
            
            render();
        }

        function render() {
            const container = document.getElementById('news-container');
            const featured = document.getElementById('featured-news');
            
            const filtered = currentCategory === 'all' 
                ? newsData 
                : newsData.filter(n => n.category === currentCategory);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-50">No news found in this category.</div>`;
                featured.innerHTML = "";
                return;
            }

            // Render Featured (The first item)
            const main = filtered[0];
            featured.innerHTML = `
                <div class="grid md:grid-cols-2 gap-8 items-center cursor-pointer group" onclick="openArticle(${main.id})">
                    <div class="overflow-hidden rounded-lg shadow-xl">
                        <img src="${main.image}" alt="Feature" class="w-full h-[400px] object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div>
                        <span class="text-orange-700 font-bold uppercase text-sm tracking-widest mb-2 block">${main.category}</span>
                        <h2 class="serif text-4xl md:text-6xl font-black mb-4 leading-tight group-hover:text-orange-700 transition-colors">${main.title}</h2>
                        <p class="text-lg opacity-70 mb-6">${main.summary}</p>
                        <div class="flex items-center gap-4 text-sm font-bold opacity-50">
                            <span>BY ${main.author}</span>
                            <span>&bull;</span>
                            <span>${main.date}</span>
                        </div>
                    </div>
                </div>
            `;

            // Render Grid (The rest)
            container.innerHTML = filtered.slice(1).map(item => `
                <article class="bg-[var(--card-bg)] rounded-lg overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer group flex flex-col" onclick="openArticle(${item.id})">
                    <div class="h-48 overflow-hidden">
                        <img src="${item.image}" alt="News" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold uppercase text-orange-700 tracking-wider">${item.category}</span>
                            <span class="text-[10px] opacity-50 uppercase">${item.date}</span>
                        </div>
                        <h3 class="serif text-xl font-bold mb-3 leading-snug group-hover:text-orange-700 transition-colors line-clamp-2">${item.title}</h3>
                        <p class="text-sm opacity-70 line-clamp-3 mb-4">${item.summary}</p>
                        <div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700 text-[10px] font-bold opacity-40 uppercase tracking-widest">
                            Continue Reading <i class="fas fa-arrow-right ml-1"></i>
                        </div>
                    </div>
                </article>
            `).join('');

            // Update Ticker
            const tickerText = filtered.slice(0, 5).map(n => `&bull; ${n.title} &nbsp;&nbsp;&nbsp;&nbsp;`).join(' ');
            document.getElementById('tickerText').innerHTML = tickerText + tickerText;
        }

        // Modal Logic
        function openArticle(id) {
            const article = newsData.find(n => n.id === id);
            const modal = document.getElementById('articleModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="mb-6">
                    <span class="text-orange-700 font-bold uppercase text-xs tracking-widest mb-2 block">${article.category}</span>
                    <h1 class="serif text-3xl md:text-4xl font-black mb-4">${article.title}</h1>
                    <div class="flex items-center gap-4 text-xs font-bold opacity-50 mb-6">
                        <span>BY ${article.author}</span>
                        <span>&bull;</span>
                        <span>${article.date}</span>
                    </div>
                </div>
                <img src="${article.image}" class="w-full h-72 object-cover rounded-lg mb-8 shadow-lg">
                <div class="prose dark:prose-invert max-w-none text-lg leading-relaxed">
                    ${article.content}
                    <p class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-800 text-sm opacity-50 italic">
                        Reporting contributed by the True News Global Network. (c) 2024
                    </p>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('articleModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Theme Toggle
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        // Initialize
        window.onload = () => {
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
            
            initNews(24);
        };

        // Close modal on Escape
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
