<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>thinkpro | cloud-sync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .btn-active { transform: scale(0.95); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-900 selection:bg-indigo-100">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] opacity-0 translate-y-10 transition-all duration-500 pointer-events-none">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-3">
            <i id="toast-icon" class="fas fa-cloud-check text-emerald-400"></i>
            <span id="toast-msg" class="text-sm font-bold"></span>
        </div>
    </div>

    <!-- Auth Screen -->
    <section id="screen-auth" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-sm text-center space-y-8 animate-fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 text-white rounded-[2.2rem] rotate-12 shadow-2xl mb-4">
                <i class="fas fa-brain text-4xl -rotate-12"></i>
            </div>
            <div>
                <h1 class="text-5xl font-extrabold tracking-tight">thinkpro</h1>
                <p class="text-slate-400 mt-3 font-medium">Decentralized cloud-sync social mesh.</p>
            </div>
            <div class="space-y-4">
                <button id="btn-auth" onclick="handleAuth()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-[1.8rem] hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 flex items-center justify-center">
                    <span>Enter Global Mesh</span>
                </button>
            </div>
            <div class="flex items-center justify-center space-x-2 text-[10px] uppercase tracking-widest text-slate-400 font-bold">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>System Ready</span>
            </div>
        </div>
    </section>

    <!-- Main Screen -->
    <section id="screen-main" class="hidden min-h-screen pb-24">
        <!-- Header -->
        <header class="sticky top-0 z-40 glass border-b border-slate-100/50">
            <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-sm shadow-lg shadow-indigo-100">
                        <i class="fas fa-brain"></i>
                    </div>
                    <span class="font-extrabold text-xl tracking-tight hidden xs:block">thinkpro</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="updateProfile()" class="flex items-center space-x-2 group pl-1 pr-3 py-1 bg-slate-50 rounded-full border border-slate-100 hover:border-indigo-200 transition-all">
                        <img id="nav-user-avatar" src="https://ui-avatars.com/api/?name=User" class="w-7 h-7 rounded-full object-cover">
                        <span id="nav-user-name" class="text-xs font-bold text-slate-700 max-w-[80px] truncate">Thinker</span>
                    </button>
                    <button onclick="logout()" class="text-slate-400 hover:text-rose-500 transition-colors w-9 h-9 flex items-center justify-center rounded-full hover:bg-rose-50">
                        <i class="fas fa-power-off text-sm"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="max-w-2xl mx-auto px-4 py-8 space-y-6">
            <!-- Composer -->
            <div class="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                <div class="flex space-x-4">
                    <img id="composer-avatar" src="https://ui-avatars.com/api/?name=User" class="w-11 h-11 rounded-[1.1rem] bg-slate-100 object-cover shadow-sm">
                    <textarea id="post-input" placeholder="What's on your mind?" class="flex-1 bg-transparent border-none focus:ring-0 text-lg font-medium placeholder:text-slate-300 resize-none h-20 pt-2 no-scrollbar" maxlength="280"></textarea>
                </div>
                <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                    <div class="flex space-x-1 text-slate-400">
                        <button class="w-10 h-10 hover:bg-slate-50 rounded-xl transition-all flex items-center justify-center"><i class="far fa-image"></i></button>
                        <button class="w-10 h-10 hover:bg-slate-50 rounded-xl transition-all flex items-center justify-center"><i class="far fa-smile"></i></button>
                    </div>
                    <button id="btn-post" onclick="submitPost()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-lg shadow-slate-100 disabled:opacity-50">
                        Post Cloud
                    </button>
                </div>
            </div>

            <!-- Feed Container -->
            <div id="feed-container" class="space-y-4">
                <!-- Posts will be injected here -->
                <div id="feed-loading" class="flex flex-col items-center justify-center py-20 space-y-4">
                    <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Waking up the cloud...</p>
                </div>
            </div>
        </main>

        <!-- Navigation (Mobile) -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass rounded-[2rem] h-16 flex items-center justify-around px-4 shadow-2xl border border-white/50 z-50">
            <button class="w-12 h-12 flex items-center justify-center text-indigo-600"><i class="fas fa-home text-xl"></i></button>
            <button class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fas fa-search text-xl"></i></button>
            <button class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fas fa-bell text-xl"></i></button>
            <button onclick="updateProfile()" class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fas fa-user text-xl"></i></button>
        </nav>
    </section>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, addDoc, updateDoc, deleteDoc, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'thinkpro-v2-stable';

        // State
        let currentUser = null;
        let userData = null;
        let isAuthProcessing = false;

        // UI Helpers
        const showToast = (msg, icon = 'fa-cloud-check', color = 'text-emerald-400') => {
            const toast = document.getElementById('toast');
            if (!toast) return;
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').className = `fas ${icon} ${color}`;
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        };

        const formatTime = (ts) => {
            if (!ts) return "Just now";
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            const diff = Math.floor((new Date() - date) / 1000);
            if (diff < 60) return "Just now";
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return date.toLocaleDateString();
        };

        // Authentication Logic (Rule 3 Fix)
        const initAuth = async () => {
            if (isAuthProcessing) return;
            isAuthProcessing = true;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
                showToast("Connection Error", "fa-triangle-exclamation", "text-rose-400");
                isAuthProcessing = false;
                const btn = document.getElementById('btn-auth');
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = 'Retry Connection';
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // FIX: Use an even number of segments for the document path
                // /artifacts/{appId}/users/{userId}/profile/data (6 segments)
                // OR /artifacts/{appId}/users/{userId} (4 segments) - let's use 6 segments for profile detail
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'settings');
                const userSnap = await getDoc(userRef);
                
                if (!userSnap.exists()) {
                    const defaultData = {
                        uid: user.uid,
                        name: "New Thinker",
                        avatar: `https://ui-avatars.com/api/?name=User&background=6366f1&color=fff`,
                        joined: serverTimestamp()
                    };
                    await setDoc(userRef, defaultData);
                    userData = defaultData;
                } else {
                    userData = userSnap.data();
                }
                
                setupRealtimeSync();
                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('screen-main').classList.remove('hidden');
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
                document.getElementById('screen-main').classList.add('hidden');
            }
        });

        // Real-time Listeners (Rule 1 & 2)
        const setupRealtimeSync = () => {
            if (!currentUser) return;

            // Global Feed Sync
            const postsCol = collection(db, 'artifacts', appId, 'public', 'data', 'posts');
            onSnapshot(postsCol, (snapshot) => {
                const posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });
                // Sort in-memory to avoid index requirement (Rule 2)
                const sortedPosts = posts.sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeB - timeA;
                });
                renderFeed(sortedPosts);
            }, (err) => {
                console.error("Feed error:", err);
                showToast("Feed Sync Failed", "fa-wifi-slash", "text-rose-400");
            });

            // Local Profile Sync
            const profileDoc = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'settings');
            onSnapshot(profileDoc, (doc) => {
                if (doc.exists()) {
                    userData = doc.data();
                    document.getElementById('nav-user-name').innerText = userData.name;
                    document.getElementById('nav-user-avatar').src = userData.avatar;
                    document.getElementById('composer-avatar').src = userData.avatar;
                }
            }, (err) => console.error("Profile sync error:", err));
        };

        const renderFeed = (posts) => {
            const container = document.getElementById('feed-container');
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 px-8 space-y-4 animate-fade-in">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-300">
                            <i class="fas fa-feather text-2xl"></i>
                        </div>
                        <p class="text-slate-400 font-medium">The mesh is empty. Start a conversation.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => {
                const isLiked = post.likes?.includes(currentUser.uid);
                const isOwner = post.authorId === currentUser.uid;
                
                return `
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm animate-fade-in">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center space-x-3">
                            <img src="${post.authorAvatar}" class="w-10 h-10 rounded-xl object-cover shadow-sm">
                            <div>
                                <p class="font-bold text-slate-900 text-sm">${post.authorName}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${formatTime(post.timestamp)}</p>
                            </div>
                        </div>
                        ${isOwner ? `
                            <button onclick="deletePost('${post.id}')" class="text-slate-300 hover:text-rose-500 transition-colors p-2">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        ` : ''}
                    </div>
                    <p class="text-slate-700 leading-relaxed mb-4 text-[15px] whitespace-pre-wrap">${post.content}</p>
                    <div class="flex items-center space-x-5 pt-3 border-t border-slate-50">
                        <button onclick="toggleLike('${post.id}', ${isLiked})" class="flex items-center space-x-1.5 transition-all group ${isLiked ? 'text-rose-500' : 'text-slate-400 hover:text-rose-400'}">
                            <i class="${isLiked ? 'fas' : 'far'} fa-heart transition-transform group-active:scale-125"></i>
                            <span class="text-xs font-black">${post.likes?.length || 0}</span>
                        </button>
                        <button class="flex items-center space-x-1.5 text-slate-400 hover:text-indigo-500 transition-all">
                            <i class="far fa-comment"></i>
                            <span class="text-xs font-black">0</span>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        };

        // Actions
        window.handleAuth = () => {
            const btn = document.getElementById('btn-auth');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Initializing...';
            initAuth();
        };

        window.submitPost = async () => {
            const input = document.getElementById('post-input');
            const content = input.value.trim();
            if (!content || !currentUser) return;

            const btn = document.getElementById('btn-post');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), {
                    content,
                    authorId: currentUser.uid,
                    authorName: userData.name || "Anonymous",
                    authorAvatar: userData.avatar,
                    likes: [],
                    timestamp: serverTimestamp()
                });

                input.value = '';
                showToast("Post propagated to mesh");
            } catch (err) {
                showToast("Cloud propagation failed", "fa-circle-xmark", "text-rose-400");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Post Cloud';
            }
        };

        window.toggleLike = async (postId, isLiked) => {
            if (!currentUser) return;
            const postRef = doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId);
            try {
                await updateDoc(postRef, {
                    likes: isLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
                });
            } catch (err) {
                showToast("Sync Error", "fa-heart-crack", "text-rose-400");
            }
        };

        window.deletePost = async (postId) => {
            if (!confirm("Remove this thought from the mesh?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'posts', postId));
                showToast("Removed from cloud");
            } catch (err) {
                showToast("Deletion failed");
            }
        };

        window.updateProfile = async () => {
            const newName = prompt("Enter your new display alias:", userData.name);
            if (!newName || newName === userData.name) return;

            try {
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'settings');
                await updateDoc(userRef, { 
                    name: newName,
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(newName)}&background=6366f1&color=fff`
                });
                showToast("Identity updated");
            } catch (err) {
                showToast("Profile update failed");
            }
        };

        window.logout = async () => {
            if (!confirm("Disconnect from the mesh?")) return;
            await signOut(auth);
            location.reload();
        };

    </script>
</body>
</html>
