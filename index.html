<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>thinkpro | local-first production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --accent: #4f46e5; 
            --accent-soft: #eef2ff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfcfd; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: saturate(180%) blur(20px); 
        }

        .card { 
            background: white; 
            border: 1px solid rgba(0,0,0,0.05); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .hidden-el { display: none !important; }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .anim-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .anim-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .anim-scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .nav-link { 
            color: #64748b; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 1.25rem; 
        }

        .nav-link.active { 
            color: var(--accent); 
            background: var(--accent-soft); 
            transform: scale(1.05);
        }

        .status-pulse { 
            width: 8px; height: 8px; background: #22c55e; border-radius: 50%; 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } 
        }

        #post-text:focus { outline: none; }
        
        /* Skeleton Loading Effect */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-900">

    <!-- Kernel Watchdog Layer -->
    <div id="kernel-monitor" class="fixed top-4 right-4 z-[100] flex items-center space-x-2 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full border border-slate-100 shadow-sm opacity-30 transition-opacity">
        <div class="status-pulse"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Kernel Active</span>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-white">
        <div class="w-full max-w-sm p-8 text-center anim-scale-in">
            <div class="w-20 h-20 bg-indigo-600 rounded-[2.5rem] shadow-2xl shadow-indigo-200 flex items-center justify-center mx-auto mb-8 transform hover:rotate-12 transition-transform cursor-pointer">
                <i class="fas fa-bolt text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2">thinkpro</h1>
            <p id="auth-desc" class="text-slate-400 font-medium mb-10">Local-First Secure Network</p>
            
            <form id="auth-form" class="space-y-4 text-left">
                <div id="signup-name-field" class="hidden-el anim-fade-in">
                    <input type="text" id="reg-name" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all outline-none" placeholder="Full Name">
                </div>
                <input type="email" id="auth-email" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all outline-none" placeholder="Email address">
                <input type="password" id="auth-password" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all outline-none" placeholder="Password">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                    <span id="auth-btn-label">Sign In</span>
                </button>
            </form>
            <button id="auth-toggle-btn" class="mt-8 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                Create a persistent local account
            </button>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="hidden-el min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar Navigation -->
        <nav class="w-24 lg:w-72 glass border-r border-slate-100 flex-col hidden md:flex sticky top-0 h-screen p-6">
            <div class="p-2 mb-10 hidden lg:block">
                <h2 class="text-2xl font-black tracking-tighter text-indigo-600">thinkpro.</h2>
            </div>
            <div class="flex-1 space-y-3">
                <button onclick="app.navigate('feed')" id="nav-feed" class="nav-link w-full flex items-center lg:space-x-4 p-4 active justify-center lg:justify-start">
                    <i class="fas fa-house-chimney text-xl"></i><span class="hidden lg:block font-bold">Timeline</span>
                </button>
                <button onclick="app.navigate('discover')" id="nav-discover" class="nav-link w-full flex items-center lg:space-x-4 p-4 justify-center lg:justify-start">
                    <i class="fas fa-compass text-xl"></i><span class="hidden lg:block font-bold">Discover</span>
                </button>
                <button onclick="app.navigate('profile')" id="nav-profile" class="nav-link w-full flex items-center lg:space-x-4 p-4 justify-center lg:justify-start">
                    <i class="fas fa-circle-user text-xl"></i><span class="hidden lg:block font-bold">Profile</span>
                </button>
            </div>
            <button onclick="app.logout()" class="p-4 rounded-2xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all flex items-center lg:space-x-4 justify-center lg:justify-start">
                <i class="fas fa-power-off text-xl"></i><span class="hidden lg:block font-bold">Logout</span>
            </button>
        </nav>

        <!-- Content Area -->
        <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8">
            <!-- Feed View -->
            <div id="view-feed" class="anim-slide-up space-y-8">
                <div class="card p-6 rounded-[2.5rem] shadow-sm">
                    <div class="flex items-start space-x-4">
                        <img id="user-avatar-mini" class="w-12 h-12 rounded-2xl object-cover bg-slate-100 shadow-sm">
                        <div class="flex-1">
                            <textarea id="post-text" rows="1" class="w-full border-none focus:ring-0 text-xl font-medium resize-none bg-transparent" placeholder="What's on your mind?"></textarea>
                            <div class="flex items-center justify-between mt-4 border-t border-slate-50 pt-4">
                                <div class="flex space-x-4">
                                    <button class="text-slate-400 hover:text-indigo-600 transition-colors"><i class="far fa-image"></i></button>
                                    <button class="text-slate-400 hover:text-indigo-600 transition-colors"><i class="far fa-smile"></i></button>
                                </div>
                                <button onclick="app.submitPost()" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">Post</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="posts-list" class="space-y-6 pb-32">
                    <!-- Skeletons -->
                    <div class="card p-6 rounded-[2.5rem] skeleton h-40"></div>
                    <div class="card p-6 rounded-[2.5rem] skeleton h-40"></div>
                </div>
            </div>

            <!-- Profile View -->
            <div id="view-profile" class="hidden-el anim-slide-up space-y-8">
                <div class="card rounded-[3rem] overflow-hidden">
                    <div class="h-44 bg-gradient-to-br from-indigo-500 via-indigo-600 to-purple-700"></div>
                    <div class="px-8 pb-10 flex flex-col items-center -mt-20">
                        <img id="profile-big-avatar" class="w-36 h-36 rounded-[2.5rem] border-8 border-white shadow-2xl object-cover bg-white">
                        <h2 id="profile-name" class="text-3xl font-black mt-6 tracking-tight"></h2>
                        <p id="profile-handle" class="text-indigo-600 font-bold text-sm tracking-wide"></p>
                        <p id="profile-bio" class="text-slate-500 mt-4 text-center max-w-sm leading-relaxed"></p>
                        <div class="flex space-x-3 mt-8">
                            <button onclick="app.editProfile()" class="px-8 py-3 rounded-2xl border-2 border-slate-100 font-bold text-sm hover:bg-slate-50 transition-all active:scale-95">Edit Profile</button>
                        </div>
                    </div>
                </div>
                <div id="user-posts-list" class="space-y-6"></div>
            </div>

            <!-- Discover View -->
            <div id="view-discover" class="hidden-el anim-slide-up space-y-6">
                <div class="relative group">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" oninput="app.search(this.value)" class="w-full pl-14 pr-6 py-5 bg-white border border-slate-100 rounded-3xl shadow-sm focus:shadow-indigo-50 transition-all text-lg outline-none" placeholder="Find thinkers...">
                </div>
                <div id="search-results" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </main>

        <!-- Mobile Nav -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-100 p-3 flex justify-around items-center z-40">
            <button onclick="app.navigate('feed')" id="mob-feed" class="p-4 nav-link active"><i class="fas fa-house-chimney text-xl"></i></button>
            <button onclick="app.navigate('discover')" id="mob-discover" class="p-4 nav-link"><i class="fas fa-compass text-xl"></i></button>
            <button onclick="app.navigate('profile')" id="mob-profile" class="p-4 nav-link"><i class="fas fa-circle-user text-xl"></i></button>
        </nav>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 glass text-indigo-600 px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-8 transition-all z-[100] font-bold text-sm pointer-events-none"></div>

    <script>
        let db;
        const state = { 
            user: null, 
            isSignup: false, 
            currentView: 'feed', 
            dbReady: false,
            kernelRunning: false
        };

        const STORAGE_KEY = 'THINKPRO_SQL_V3_FINAL';

        // --- Core Persistance ---
        const save = () => {
            if (!state.dbReady) return;
            try {
                const data = db.export();
                const blob = new Blob([data]);
                const reader = new FileReader();
                reader.onload = () => localStorage.setItem(STORAGE_KEY, reader.result);
                reader.readAsDataURL(blob);
            } catch (e) { console.error("Persistence failed:", e); }
        };

        const load = async (SQL) => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const binary = atob(saved.split(',')[1]);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
                    return new SQL.Database(array);
                } catch (e) { return null; }
            }
            return null;
        };

        // --- Kernel Watchdog (While loop logic for 24/7 reliability) ---
        const initWatchdog = () => {
            if (state.kernelRunning) return;
            state.kernelRunning = true;

            setInterval(() => {
                const mon = document.getElementById('kernel-monitor');
                mon.classList.remove('opacity-30');
                mon.classList.add('opacity-100');
                
                // Uptime Safety Check
                if (state.user) {
                    const app = document.getElementById('app-shell');
                    const auth = document.getElementById('auth-screen');
                    if (app.classList.contains('hidden-el')) {
                        app.classList.remove('hidden-el');
                        auth.classList.add('hidden-el');
                    }
                } else {
                    const app = document.getElementById('app-shell');
                    const auth = document.getElementById('auth-screen');
                    if (!app.classList.contains('hidden-el')) {
                        app.classList.add('hidden-el');
                        auth.classList.remove('hidden-el');
                    }
                }

                // Database Integrity Pulse
                if (state.dbReady) {
                    try { db.exec("SELECT 1"); } catch(e) { location.reload(); }
                }

                setTimeout(() => mon.classList.add('opacity-30'), 800);
            }, 3000);
        };

        const init = async () => {
            try {
                const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
                db = await load(SQL);
                
                if (!db) {
                    db = new SQL.Database();
                    db.run(`
                        CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, email TEXT UNIQUE, pass TEXT, name TEXT, bio TEXT, avatar TEXT);
                        CREATE TABLE posts (id INTEGER PRIMARY KEY AUTOINCREMENT, uid INTEGER, content TEXT, ts DATETIME DEFAULT CURRENT_TIMESTAMP);
                        CREATE TABLE likes (pid INTEGER, uid INTEGER, PRIMARY KEY(pid, uid));
                    `);
                    db.run("INSERT INTO users (email, pass, name, bio, avatar) VALUES (?,?,?,?,?)", [
                        'hello@think.pro', 'pass', 'Default Thinker', 'Exploring the local-first frontier.', 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop'
                    ]);
                }
                
                state.dbReady = true;
                document.getElementById('posts-list').innerHTML = ''; // Clear skeletons
                initWatchdog();
            } catch (e) {
                console.error("Critical Engine Error");
            }
        };

        const toast = (msg) => {
            const el = document.getElementById('toast');
            el.innerText = msg;
            el.style.opacity = '1';
            el.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transform = 'translate(-50%, 2rem)';
            }, 2500);
        };

        const sync = () => {
            if (!state.user || !state.dbReady) return;
            save();
            if (state.currentView === 'feed') renderFeed();
            if (state.currentView === 'profile') renderProfile(state.user.id);
        };

        const renderFeed = () => {
            const res = db.exec(`
                SELECT p.id, p.content, p.ts, u.name, u.avatar, u.id as uid,
                (SELECT COUNT(*) FROM likes WHERE pid = p.id) as likes,
                (SELECT 1 FROM likes WHERE pid = p.id AND uid = ${state.user.id}) as is_liked
                FROM posts p JOIN users u ON p.uid = u.id ORDER BY p.ts DESC
            `);
            const list = document.getElementById('posts-list');
            list.innerHTML = res.length ? '' : '<div class="text-center py-20 text-slate-300 font-medium anim-fade-in">Silence... for now.</div>';
            
            if (res.length) {
                res[0].values.forEach(v => {
                    const p = { id: v[0], content: v[1], time: timeAgo(v[2]), author: v[3], avatar: v[4], uid: v[5], likes: v[6], liked: v[7] };
                    const d = document.createElement('div');
                    d.className = 'card p-6 rounded-[2.5rem] flex space-x-4 anim-slide-up';
                    d.innerHTML = `
                        <img src="${p.avatar}" onclick="app.viewUser(${p.uid})" class="w-12 h-12 rounded-2xl cursor-pointer bg-slate-50 object-cover hover:ring-2 hover:ring-indigo-100 transition-all">
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-1">
                                <h4 class="font-bold text-slate-900 cursor-pointer hover:text-indigo-600 transition-colors" onclick="app.viewUser(${p.uid})">${p.author}</h4>
                                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${p.time}</span>
                            </div>
                            <p class="text-slate-600 leading-relaxed break-words">${p.content}</p>
                            <div class="mt-4 pt-4 border-t border-slate-50">
                                <button onclick="app.like(${p.id})" class="flex items-center space-x-2 ${p.liked ? 'text-rose-500' : 'text-slate-400'} hover:scale-110 active:scale-90 transition-all">
                                    <i class="${p.liked ? 'fas' : 'far'} fa-heart"></i>
                                    <span class="text-xs font-black">${p.likes}</span>
                                </button>
                            </div>
                        </div>`;
                    list.appendChild(d);
                });
            }
        };

        const renderProfile = (uid) => {
            const uData = db.exec("SELECT * FROM users WHERE id = ?", [uid]);
            if (!uData.length) return;
            const r = uData[0].values[0];
            const user = { id: r[0], name: r[3], bio: r[4], avatar: r[5] };

            document.getElementById('profile-big-avatar').src = user.avatar;
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-handle').innerText = `@${user.name.toLowerCase().replace(/\s/g, '')}`;
            document.getElementById('profile-bio').innerText = user.bio || 'This thinker hasn\'t shared a bio yet.';

            const postsRes = db.exec("SELECT content, ts FROM posts WHERE uid = ? ORDER BY ts DESC", [uid]);
            const list = document.getElementById('user-posts-list');
            list.innerHTML = postsRes.length ? '' : '<div class="text-center py-10 text-slate-300 text-sm italic">Nothing posted here.</div>';
            if (postsRes.length) {
                postsRes[0].values.forEach(v => {
                    const d = document.createElement('div');
                    d.className = 'card p-6 rounded-[2.5rem] anim-slide-up';
                    d.innerHTML = `<p class="text-slate-700 leading-relaxed">${v[0]}</p><p class="text-[10px] font-black text-slate-300 mt-4 uppercase tracking-tighter">${timeAgo(v[1])}</p>`;
                    list.appendChild(d);
                });
            }
        };

        const timeAgo = (ts) => {
            const d = new Date(ts + 'Z');
            const diff = (new Date() - d) / 1000;
            if (diff < 60) return 'now';
            if (diff < 3600) return `${Math.floor(diff/60)}m`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h`;
            return d.toLocaleDateString();
        };

        window.app = {
            navigate: (screen) => {
                state.currentView = screen;
                ['feed', 'profile', 'discover'].forEach(s => {
                    const el = document.getElementById(`view-${s}`);
                    const nav = document.getElementById(`nav-${s}`);
                    const mob = document.getElementById(`mob-${s}`);
                    
                    if (s === screen) {
                        el.classList.remove('hidden-el');
                        if (nav) nav.classList.add('active');
                        if (mob) mob.classList.add('active');
                    } else {
                        el.classList.add('hidden-el');
                        if (nav) nav.classList.remove('active');
                        if (mob) mob.classList.remove('active');
                    }
                });
                sync();
            },
            logout: () => {
                state.user = null;
                document.getElementById('auth-password').value = '';
                toast("Session Terminated.");
            },
            submitPost: () => {
                const el = document.getElementById('post-text');
                const val = el.value.trim();
                if (!val) return;
                db.run("INSERT INTO posts (uid, content) VALUES (?,?)", [state.user.id, val]);
                el.value = '';
                toast("Thought Synced.");
                sync();
            },
            like: (pid) => {
                try {
                    db.run("INSERT INTO likes (pid, uid) VALUES (?,?)", [pid, state.user.id]);
                } catch(e) {
                    db.run("DELETE FROM likes WHERE pid = ? AND uid = ?", [pid, state.user.id]);
                }
                sync();
            },
            viewUser: (uid) => {
                app.navigate('profile');
                renderProfile(uid);
            },
            editProfile: () => {
                const n = prompt("Display Name", state.user.name);
                const b = prompt("Short Bio", state.user.bio);
                if (n) {
                    db.run("UPDATE users SET name = ?, bio = ? WHERE id = ?", [n, b, state.user.id]);
                    state.user.name = n;
                    state.user.bio = b;
                    sync();
                    toast("Identity Updated.");
                }
            },
            search: (q) => {
                const resEl = document.getElementById('search-results');
                if (!q.trim()) { resEl.innerHTML = ''; return; }
                const users = db.exec("SELECT id, name, avatar FROM users WHERE name LIKE ? LIMIT 10", [`%${q}%`]);
                resEl.innerHTML = '';
                if (users.length) {
                    users[0].values.forEach(u => {
                        const d = document.createElement('div');
                        d.className = 'card p-4 rounded-2xl flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-all active:scale-95 anim-fade-in';
                        d.onclick = () => app.viewUser(u[0]);
                        d.innerHTML = `
                            <div class="flex items-center space-x-3">
                                <img src="${u[2]}" class="w-10 h-10 rounded-xl object-cover shadow-sm">
                                <p class="font-bold text-sm text-slate-800">${u[1]}</p>
                            </div>
                            <i class="fas fa-arrow-right text-slate-300 text-xs"></i>
                        `;
                        resEl.appendChild(d);
                    });
                } else {
                    resEl.innerHTML = '<p class="col-span-2 text-center py-10 text-slate-400 text-sm italic">No thinkers found.</p>';
                }
            }
        };

        // UI Event Listeners
        document.getElementById('auth-toggle-btn').onclick = () => {
            state.isSignup = !state.isSignup;
            document.getElementById('signup-name-field').classList.toggle('hidden-el', !state.isSignup);
            document.getElementById('auth-btn-label').innerText = state.isSignup ? 'Create Profile' : 'Access Grid';
            document.getElementById('auth-toggle-btn').innerText = state.isSignup ? 'Already a member? Sign In' : 'New here? Join the local network';
        };

        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const name = document.getElementById('reg-name').value;

            if (state.isSignup) {
                try {
                    db.run("INSERT INTO users (email, pass, name, bio, avatar) VALUES (?,?,?,?,?)", [
                        email, pass, name, 'Ready to think.', `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=4f46e5&color=fff&bold=true`
                    ]);
                    save();
                    toast("Account Localized.");
                    document.getElementById('auth-toggle-btn').click();
                } catch(e) { toast("Email unavailable."); }
            } else {
                const res = db.exec("SELECT * FROM users WHERE email = ? AND pass = ?", [email, pass]);
                if (res.length && res[0].values.length) {
                    const r = res[0].values[0];
                    state.user = { id: r[0], email: r[1], name: r[3], bio: r[4], avatar: r[5] };
                    
                    document.getElementById('auth-screen').style.opacity = '0';
                    document.getElementById('auth-screen').style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        document.getElementById('auth-screen').classList.add('hidden-el');
                        document.getElementById('app-shell').classList.remove('hidden-el');
                        document.getElementById('user-avatar-mini').src = state.user.avatar;
                        app.navigate('feed');
                    }, 300);
                } else { toast("Access Denied."); }
            }
        };

        // Textarea Auto-Resize
        const tx = document.getElementById('post-text');
        tx.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = (this.scrollHeight) + "px";
        }, false);

        window.onload = init;
    </script>
</body>
</html>
