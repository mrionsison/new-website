<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>thinkpro | local-first production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        :root { --accent: #4f46e5; }
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); }
        .card { background: white; border: 1px solid rgba(0,0,0,0.05); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hidden-el { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link { color: #64748b; transition: all 0.2s; border-radius: 1rem; }
        .nav-link.active { color: var(--accent); background: #eef2ff; }
        .status-pulse { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 0 rgba(34, 197, 94, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="text-slate-900">

    <!-- Kernel Watchdog Layer -->
    <div id="kernel-monitor" class="fixed top-4 right-4 z-[100] flex items-center space-x-2 bg-white/80 backdrop-blur px-3 py-1.5 rounded-full border border-slate-100 shadow-sm opacity-0 transition-opacity">
        <div class="status-pulse"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Kernel Active</span>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-white transition-all duration-500">
        <div class="w-full max-w-sm p-8 text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-[2.5rem] shadow-2xl shadow-indigo-200 flex items-center justify-center mx-auto mb-8 transform hover:rotate-12 transition-transform cursor-pointer">
                <i class="fas fa-bolt text-white text-3xl"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2">thinkpro</h1>
            <p id="auth-desc" class="text-slate-400 font-medium mb-10">Local-First Production Engine</p>
            
            <form id="auth-form" class="space-y-4 text-left">
                <div id="signup-name-field" class="hidden-el">
                    <input type="text" id="reg-name" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all" placeholder="Full Name">
                </div>
                <input type="email" id="auth-email" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all" placeholder="Email address">
                <input type="password" id="auth-password" required class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-100 transition-all" placeholder="Password">
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    <span id="auth-btn-label">Sign In</span>
                </button>
            </form>
            <button id="auth-toggle-btn" class="mt-8 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                Create a persistent local account
            </button>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="app-shell" class="hidden-el min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar Navigation -->
        <nav class="w-24 lg:w-72 glass border-r border-slate-100 flex-col hidden md:flex sticky top-0 h-screen p-6">
            <div class="p-2 mb-10 hidden lg:block">
                <h2 class="text-2xl font-black tracking-tighter text-indigo-600">thinkpro.</h2>
            </div>
            <div class="flex-1 space-y-3">
                <button onclick="app.navigate('feed')" id="nav-feed" class="nav-link w-full flex items-center lg:space-x-4 p-4 active justify-center lg:justify-start">
                    <i class="fas fa-home text-xl"></i><span class="hidden lg:block font-bold">Timeline</span>
                </button>
                <button onclick="app.navigate('discover')" id="nav-discover" class="nav-link w-full flex items-center lg:space-x-4 p-4 justify-center lg:justify-start">
                    <i class="fas fa-search text-xl"></i><span class="hidden lg:block font-bold">Discover</span>
                </button>
                <button onclick="app.navigate('profile')" id="nav-profile" class="nav-link w-full flex items-center lg:space-x-4 p-4 justify-center lg:justify-start">
                    <i class="fas fa-user text-xl"></i><span class="hidden lg:block font-bold">Profile</span>
                </button>
            </div>
            <button onclick="app.logout()" class="p-4 rounded-2xl text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all flex items-center lg:space-x-4 justify-center lg:justify-start">
                <i class="fas fa-power-off text-xl"></i><span class="hidden lg:block font-bold">Logout</span>
            </button>
        </nav>

        <!-- Content Area -->
        <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
            <div id="view-feed" class="fade-in space-y-8">
                <div class="card p-6 rounded-[2.5rem] shadow-sm">
                    <div class="flex items-start space-x-4">
                        <img id="user-avatar-mini" class="w-12 h-12 rounded-2xl object-cover bg-slate-100">
                        <div class="flex-1">
                            <textarea id="post-text" rows="1" class="w-full border-none focus:ring-0 text-xl font-medium resize-none" placeholder="Capture a thought..."></textarea>
                            <div class="flex items-center justify-between mt-4 border-t border-slate-50 pt-4">
                                <span class="text-[10px] font-black text-slate-300 uppercase">Local Secure Sync</span>
                                <button onclick="app.submitPost()" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-100">Post</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="posts-list" class="space-y-6 pb-32"></div>
            </div>

            <div id="view-profile" class="hidden-el fade-in space-y-8">
                <div class="card rounded-[3rem] overflow-hidden">
                    <div class="h-40 bg-gradient-to-br from-indigo-600 to-indigo-800"></div>
                    <div class="px-8 pb-10 flex flex-col items-center -mt-20">
                        <img id="profile-big-avatar" class="w-36 h-36 rounded-[2.5rem] border-8 border-white shadow-2xl object-cover">
                        <h2 id="profile-name" class="text-3xl font-black mt-6"></h2>
                        <p id="profile-handle" class="text-indigo-600 font-bold text-sm tracking-wide"></p>
                        <p id="profile-bio" class="text-slate-500 mt-4 text-center max-w-sm"></p>
                        <div class="flex space-x-3 mt-8">
                            <button onclick="app.editProfile()" class="px-8 py-2.5 rounded-xl border-2 border-slate-100 font-bold text-sm hover:bg-slate-50 transition-colors">Edit Profile</button>
                        </div>
                    </div>
                </div>
                <div id="user-posts-list" class="space-y-6"></div>
            </div>

            <div id="view-discover" class="hidden-el fade-in space-y-6">
                <div class="relative group">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" oninput="app.search(this.value)" class="w-full pl-14 pr-6 py-5 bg-white border border-slate-100 rounded-3xl shadow-sm focus:shadow-indigo-50 transition-all text-lg" placeholder="Search people in the database...">
                </div>
                <div id="search-results" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
        </main>

        <!-- Mobile Bar -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-100 p-2 flex justify-around items-center z-40">
            <button onclick="app.navigate('feed')" class="p-4 text-slate-400"><i class="fas fa-home text-xl"></i></button>
            <button onclick="app.navigate('discover')" class="p-4 text-slate-400"><i class="fas fa-search text-xl"></i></button>
            <button onclick="app.navigate('profile')" class="p-4 text-slate-400"><i class="fas fa-user text-xl"></i></button>
        </nav>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 glass text-indigo-600 px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-4 transition-all z-[100] font-bold text-sm pointer-events-none"></div>

    <script>
        let db;
        const state = { user: null, isSignup: false, currentView: 'feed', lastSync: Date.now() };

        // --- PRODUCTION PERSISTENCE LAYER ---
        const STORAGE_KEY = 'THINKPRO_DB_EXPORT';
        const saveToDisk = () => {
            const data = db.export();
            const blob = new Blob([data]);
            const reader = new FileReader();
            reader.onload = () => {
                localStorage.setItem(STORAGE_KEY, reader.result);
                state.lastSync = Date.now();
            };
            reader.readAsDataURL(blob);
        };

        const loadFromDisk = async (SQL) => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const base64Data = saved.split(',')[1];
                const binaryData = atob(base64Data);
                const array = new Uint8Array(binaryData.length);
                for (let i = 0; i < binaryData.length; i++) array[i] = binaryData.charCodeAt(i);
                return new SQL.Database(array);
            }
            return null;
        };

        // --- KERNEL WATCHDOG (While Loop Equivalent) ---
        const runKernel = () => {
            // This is the 24/7 Safety Loop
            setInterval(() => {
                const monitor = document.getElementById('kernel-monitor');
                monitor.style.opacity = '1';
                
                // Safety check 1: UI Integrity
                if (state.user && document.getElementById('app-shell').classList.contains('hidden-el')) {
                    console.warn("Kernel: UI Mismatch detected. Correcting...");
                    document.getElementById('app-shell').classList.remove('hidden-el');
                }

                // Safety check 2: DB Pulse
                try {
                    db.exec("SELECT 1");
                } catch (e) {
                    console.error("Kernel: DB Crash detected. Emergency restart...");
                    location.reload(); 
                }

                setTimeout(() => monitor.style.opacity = '0.3', 500);
            }, 5000);
        };

        const initDB = async () => {
            try {
                const SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
                db = await loadFromDisk(SQL);
                
                if (!db) {
                    db = new SQL.Database();
                    db.run(`
                        CREATE TABLE users (id INTEGER PRIMARY KEY AUTOINCREMENT, email TEXT UNIQUE, pass TEXT, name TEXT, bio TEXT, avatar TEXT);
                        CREATE TABLE posts (id INTEGER PRIMARY KEY AUTOINCREMENT, uid INTEGER, content TEXT, ts DATETIME DEFAULT CURRENT_TIMESTAMP);
                        CREATE TABLE likes (pid INTEGER, uid INTEGER, PRIMARY KEY(pid, uid));
                    `);
                    db.run("INSERT INTO users (email, pass, name, bio, avatar) VALUES (?,?,?,?,?)", [
                        'admin@thinkpro.com', 'admin', 'System Admin', 'Persistent local session active.', 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200&h=200&fit=crop'
                    ]);
                }
                
                runKernel();
                console.log("🚀 Production Kernel Online");
            } catch (e) {
                console.error("Critical Engine Failure:", e);
                alert("Critical database error. Please clear cache and refresh.");
            }
        };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.replace('opacity-0', 'opacity-100');
            t.classList.remove('translate-y-4');
            setTimeout(() => {
                t.classList.replace('opacity-100', 'opacity-0');
                t.classList.add('translate-y-4');
            }, 2500);
        };

        const syncUI = () => {
            if (!state.user) return;
            saveToDisk(); // Persist every UI change
            if (state.currentView === 'feed') renderFeed();
            if (state.currentView === 'profile') renderProfile(state.user.id);
        };

        const formatTime = (ts) => {
            const date = new Date(ts + 'Z');
            const diff = (new Date() - date) / 1000;
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return date.toLocaleDateString();
        };

        const renderFeed = () => {
            const res = db.exec(`
                SELECT p.id, p.content, p.ts, u.name, u.avatar, u.id as uid,
                (SELECT COUNT(*) FROM likes WHERE pid = p.id) as likes,
                (SELECT 1 FROM likes WHERE pid = p.id AND uid = ${state.user.id}) as is_liked
                FROM posts p JOIN users u ON p.uid = u.id ORDER BY p.ts DESC
            `);
            const list = document.getElementById('posts-list');
            list.innerHTML = res.length ? '' : '<div class="text-center py-20 text-slate-300 font-medium">No activity in the local sector.</div>';
            
            if (res.length) {
                res[0].values.forEach(v => {
                    const p = { id: v[0], content: v[1], time: formatTime(v[2]), author: v[3], avatar: v[4], uid: v[5], likes: v[6], liked: v[7] };
                    const d = document.createElement('div');
                    d.className = 'card p-6 rounded-[2.5rem] shadow-sm flex space-x-4 fade-in';
                    d.innerHTML = `
                        <img src="${p.avatar}" onclick="app.renderProfile(${p.uid})" class="w-12 h-12 rounded-2xl cursor-pointer bg-slate-50 object-cover">
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-2">
                                <h4 class="font-bold text-slate-900 cursor-pointer" onclick="app.renderProfile(${p.uid})">${p.author}</h4>
                                <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${p.time}</span>
                            </div>
                            <p class="text-slate-600 leading-relaxed">${p.content}</p>
                            <div class="mt-6 flex space-x-4">
                                <button onclick="app.likePost(${p.id})" class="flex items-center space-x-2 ${p.liked ? 'text-rose-500' : 'text-slate-300'} transition-colors">
                                    <i class="${p.liked ? 'fas' : 'far'} fa-heart"></i>
                                    <span class="text-xs font-bold">${p.likes}</span>
                                </button>
                            </div>
                        </div>`;
                    list.appendChild(d);
                });
            }
        };

        const renderProfile = (uid) => {
            const uData = db.exec("SELECT * FROM users WHERE id = ?", [uid]);
            if (!uData.length) return;
            const r = uData[0].values[0];
            const user = { id: r[0], name: r[3], bio: r[4], avatar: r[5] };

            document.getElementById('profile-big-avatar').src = user.avatar;
            document.getElementById('profile-name').innerText = user.name;
            document.getElementById('profile-handle').innerText = `@${user.name.toLowerCase().replace(/\s/g, '')}`;
            document.getElementById('profile-bio').innerText = user.bio || 'New thinker in the grid.';

            const postsRes = db.exec("SELECT content, ts FROM posts WHERE uid = ? ORDER BY ts DESC", [uid]);
            const list = document.getElementById('user-posts-list');
            list.innerHTML = '';
            if (postsRes.length) {
                postsRes[0].values.forEach(v => {
                    const d = document.createElement('div');
                    d.className = 'card p-6 rounded-[2.5rem] shadow-sm';
                    d.innerHTML = `<p class="text-slate-700">${v[0]}</p><p class="text-[10px] font-black text-slate-300 mt-4 uppercase">${formatTime(v[1])}</p>`;
                    list.appendChild(d);
                });
            }
        };

        window.app = {
            navigate: (screen) => {
                state.currentView = screen;
                ['feed', 'profile', 'discover'].forEach(s => {
                    document.getElementById(`view-${s}`).classList.toggle('hidden-el', s !== screen);
                    const navBtn = document.getElementById(`nav-${s}`);
                    if (navBtn) navBtn.classList.toggle('active', s === screen);
                });
                syncUI();
            },
            logout: () => {
                state.user = null;
                document.getElementById('app-shell').classList.add('hidden-el');
                document.getElementById('auth-screen').classList.remove('hidden-el');
            },
            submitPost: () => {
                const el = document.getElementById('post-text');
                const val = el.value.trim();
                if (!val) return;
                db.run("INSERT INTO posts (uid, content) VALUES (?,?)", [state.user.id, val]);
                el.value = '';
                showToast("Data Synced.");
                syncUI();
            },
            likePost: (pid) => {
                try {
                    db.run("INSERT INTO likes (pid, uid) VALUES (?,?)", [pid, state.user.id]);
                } catch(e) {
                    db.run("DELETE FROM likes WHERE pid = ? AND uid = ?", [pid, state.user.id]);
                }
                syncUI();
            },
            renderProfile: (uid) => {
                app.navigate('profile');
                renderProfile(uid);
            },
            editProfile: () => {
                const n = prompt("Name", state.user.name);
                const b = prompt("Bio", state.user.bio);
                if (n) {
                    db.run("UPDATE users SET name = ?, bio = ? WHERE id = ?", [n, b, state.user.id]);
                    state.user.name = n;
                    state.user.bio = b;
                    syncUI();
                    showToast("Profile updated.");
                }
            },
            search: (q) => {
                const resEl = document.getElementById('search-results');
                if (!q) { resEl.innerHTML = ''; return; }
                const users = db.exec("SELECT id, name, avatar FROM users WHERE name LIKE ?", [`%${q}%`]);
                resEl.innerHTML = '';
                if (users.length) {
                    users[0].values.forEach(u => {
                        const d = document.createElement('div');
                        d.className = 'card p-4 rounded-2xl flex items-center justify-between cursor-pointer';
                        d.onclick = () => app.renderProfile(u[0]);
                        d.innerHTML = `<div class="flex items-center space-x-3"><img src="${u[2]}" class="w-10 h-10 rounded-xl object-cover"><p class="font-bold text-sm">${u[1]}</p></div><i class="fas fa-chevron-right text-slate-300 text-xs"></i>`;
                        resEl.appendChild(d);
                    });
                }
            }
        };

        document.getElementById('auth-toggle-btn').onclick = () => {
            state.isSignup = !state.isSignup;
            document.getElementById('signup-name-field').classList.toggle('hidden-el', !state.isSignup);
            document.getElementById('auth-btn-label').innerText = state.isSignup ? 'Create Account' : 'Sign In';
            document.getElementById('auth-toggle-btn').innerText = state.isSignup ? 'Already have an account? Sign In' : 'New here? Create a local account';
        };

        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            const name = document.getElementById('reg-name').value;

            if (state.isSignup) {
                try {
                    db.run("INSERT INTO users (email, pass, name, bio, avatar) VALUES (?,?,?,?,?)", [
                        email, pass, name, 'Active member.', `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`
                    ]);
                    saveToDisk();
                    showToast("Account Locked. Sign in now.");
                    document.getElementById('auth-toggle-btn').click();
                } catch(e) { showToast("Email conflict."); }
            } else {
                const res = db.exec("SELECT * FROM users WHERE email = ? AND pass = ?", [email, pass]);
                if (res.length && res[0].values.length) {
                    const r = res[0].values[0];
                    state.user = { id: r[0], email: r[1], name: r[3], bio: r[4], avatar: r[5] };
                    document.getElementById('auth-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('auth-screen').classList.add('hidden-el');
                        document.getElementById('app-shell').classList.remove('hidden-el');
                        document.getElementById('user-avatar-mini').src = state.user.avatar;
                        app.navigate('feed');
                    }, 500);
                } else {
                    showToast("Authentication Failed.");
                }
            }
        };

        window.onload = initDB;
    </script>
</body>
</html>
