<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>thinkpro | SQL & Server Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root { 
            --accent: #6366f1; 
            --accent-soft: rgba(99, 102, 241, 0.1);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfcfd; 
            color: #0f172a;
            overscroll-behavior: none;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .card { 
            background: white; 
            border: 1px solid rgba(0,0,0,0.06); 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
            filter: brightness(1.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-slide-up { animation: slideUp 0.4s ease-out forwards; }

        .nav-active { color: var(--accent); position: relative; }
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <!-- Auth Screen -->
    <div id="screen-auth" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-xl rotate-3">
                <i class="fas fa-server text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">thinkpro.</h1>
            <p id="auth-subtitle" class="text-slate-400 font-medium mb-10">SQL Engine & Mock Server Active.</p>

            <form id="form-auth" class="space-y-4 text-left">
                <div id="field-name" class="hidden">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" id="input-name" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-300 transition-all" placeholder="Enter your name">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Username / Email</label>
                    <input type="text" id="input-email" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-indigo-300 transition-all" placeholder="yourname">
                </div>
                <button type="submit" class="w-full btn-primary font-bold py-4 rounded-2xl mt-4 flex items-center justify-center space-x-2">
                    <span id="btn-auth-text">Initialize Connection</span>
                    <i class="fas fa-database text-xs opacity-50"></i>
                </button>
            </form>

            <button id="btn-toggle-auth" class="mt-8 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                New user? Register on Server
            </button>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app-shell" class="hidden min-h-screen pb-20 lg:pb-0 lg:pl-72">
        
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 h-full w-72 bg-white border-r border-slate-100 p-8 hidden lg:flex flex-col z-50">
            <h2 class="text-2xl font-black text-indigo-600 mb-12 tracking-tighter">thinkpro.</h2>
            <nav class="flex-1 space-y-2">
                <button onclick="router.navigate('feed')" id="nav-d-feed" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-house"></i><span>Home Feed</span>
                </button>
                <button onclick="router.navigate('discover')" id="nav-d-discover" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-search"></i><span>Discover</span>
                </button>
                <button onclick="router.navigate('profile')" id="nav-d-profile" class="w-full flex items-center space-x-4 p-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 hover:text-slate-600 transition-all">
                    <i class="fas fa-user"></i><span>My Profile</span>
                </button>
            </nav>
            
            <div class="mt-auto p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Server Logs</p>
                <div id="server-status" class="text-[10px] text-green-500 font-mono">200 OK: DB Connected</div>
            </div>

            <button onclick="app.logout()" class="p-4 text-slate-400 hover:text-red-500 font-bold flex items-center space-x-4 transition-colors">
                <i class="fas fa-sign-out-alt"></i><span>Terminate Session</span>
            </button>
        </aside>

        <!-- Dynamic Header -->
        <header class="sticky top-0 z-40 glass px-6 py-4 flex items-center justify-between">
            <h1 id="view-title" class="text-xl font-extrabold tracking-tight capitalize">Home Feed</h1>
            <div class="flex items-center space-x-3">
                <div class="hidden sm:flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-full">
                    <i class="fas fa-microchip text-indigo-400 text-[10px]"></i>
                    <span id="latency-indicator" class="text-[10px] font-black text-white uppercase tracking-tighter">0ms</span>
                </div>
                <img id="user-avatar-small" class="w-9 h-9 rounded-xl object-cover bg-slate-100 border border-slate-100">
            </div>
        </header>

        <!-- Main Container -->
        <main id="view-container" class="max-w-2xl mx-auto p-4 md:p-8">
            <!-- Screens same as previous version but logic will differ -->
            <div id="screen-feed" class="anim-slide-up space-y-6">
                <div class="card p-5 rounded-[2rem] shadow-sm">
                    <div class="flex space-x-4">
                        <img id="composer-avatar" class="w-12 h-12 rounded-2xl object-cover bg-slate-50">
                        <div class="flex-1">
                            <textarea id="post-input" class="w-full border-none resize-none py-2 text-lg font-medium bg-transparent outline-none no-scrollbar" placeholder="What are you thinking?" rows="1"></textarea>
                            <div id="image-preview-container" class="hidden mt-3 relative inline-block">
                                <img id="post-image-preview" class="max-h-48 rounded-2xl border border-slate-100">
                                <button onclick="feedManager.clearImage()" class="absolute -top-2 -right-2 bg-black/50 text-white w-6 h-6 rounded-full text-xs"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                                <div class="flex space-x-4 text-slate-400">
                                    <label class="cursor-pointer hover:text-indigo-600 transition-colors">
                                        <i class="far fa-image"></i>
                                        <input type="file" id="post-image-input" class="hidden" accept="image/*">
                                    </label>
                                </div>
                                <button onclick="feedManager.createPost()" class="btn-primary px-8 py-2.5 rounded-xl font-bold text-sm">Post to Server</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="feed-list" class="space-y-6"></div>
            </div>

            <div id="screen-profile" class="hidden anim-slide-up">
                <div class="card rounded-[2.5rem] overflow-hidden">
                    <div class="h-32 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
                    <div class="px-8 pb-10 flex flex-col items-center -mt-12">
                        <img id="profile-img" class="w-28 h-28 rounded-[2.2rem] border-8 border-white shadow-xl bg-white object-cover">
                        <h2 id="profile-name" class="text-2xl font-black mt-4 text-slate-900"></h2>
                        <p id="profile-handle" class="text-indigo-600 font-bold text-sm mb-6"></p>
                        <div class="grid grid-cols-3 gap-8 w-full border-t border-slate-50 pt-8 mt-2">
                            <div class="text-center">
                                <p id="stat-posts" class="font-black text-xl text-slate-800">0</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">Posts</p>
                            </div>
                            <div class="text-center">
                                <p class="font-black text-xl text-slate-800">0</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">Followers</p>
                            </div>
                            <div class="text-center">
                                <p class="font-black text-xl text-slate-800">0</p>
                                <p class="text-[10px] font-black text-slate-300 uppercase">Following</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="screen-discover" class="hidden anim-slide-up space-y-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="search-input" placeholder="Querying user database..." class="w-full pl-14 pr-6 py-5 bg-white border border-slate-100 rounded-[2rem] shadow-sm outline-none focus:border-indigo-300 transition-all">
                </div>
                <div id="user-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>

        <!-- Nav (Mobile) -->
        <nav class="fixed bottom-0 left-0 right-0 glass px-6 py-4 flex justify-around items-center lg:hidden z-50">
            <button onclick="router.navigate('feed')" id="nav-m-feed" class="p-3 text-slate-400"><i class="fas fa-house text-xl"></i></button>
            <button onclick="router.navigate('discover')" id="nav-m-discover" class="p-3 text-slate-400"><i class="fas fa-search text-xl"></i></button>
            <button onclick="router.navigate('profile')" id="nav-m-profile" class="p-3 text-slate-400"><i class="fas fa-user text-xl"></i></button>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center space-x-3">
            <span id="toast-msg" class="text-sm font-bold"></span>
        </div>
    </div>

    <script>
        /**
         * VIRTUAL SQL DATABASE ENGINE
         * Mimics relational table structures and persistence
         */
        const SQL_DB = {
            tables: {
                users: 'tp_users',
                posts: 'tp_posts',
                sessions: 'tp_sessions'
            },
            init: function() {
                if (!localStorage.getItem(this.tables.users)) localStorage.setItem(this.tables.users, '[]');
                if (!localStorage.getItem(this.tables.posts)) localStorage.setItem(this.tables.posts, '[]');
            },
            query: function(table, predicate = () => true) {
                const data = JSON.parse(localStorage.getItem(this.tables[table]) || '[]');
                return data.filter(predicate);
            },
            insert: function(table, record) {
                const data = JSON.parse(localStorage.getItem(this.tables[table]) || '[]');
                const newRecord = { ...record, id: Date.now() + Math.random() };
                data.unshift(newRecord);
                localStorage.setItem(this.tables[table], JSON.stringify(data));
                return newRecord;
            }
        };

        /**
         * MOCK SERVER LAYER
         * Provides an "API" interface with simulated latency and response codes
         */
        const MockServer = {
            latency: () => Math.floor(Math.random() * 150) + 50,
            log: (msg) => {
                const logEl = document.getElementById('server-status');
                if(logEl) logEl.innerText = msg;
            },
            request: async function(endpoint, method, payload) {
                const start = performance.now();
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        const end = performance.now();
                        document.getElementById('latency-indicator').innerText = `${Math.round(end - start)}ms`;
                        
                        try {
                            const result = this.endpoints[endpoint](method, payload);
                            this.log(`200 OK: ${endpoint}`);
                            resolve(result);
                        } catch (e) {
                            this.log(`500 ERR: ${e.message}`);
                            reject(e);
                        }
                    }, this.latency());
                });
            },
            endpoints: {
                '/auth/login': (method, { handle }) => {
                    const users = SQL_DB.query('users', u => u.handle === handle);
                    if (users.length === 0) throw new Error("User not found");
                    return users[0];
                },
                '/auth/register': (method, { handle, name }) => {
                    const exists = SQL_DB.query('users', u => u.handle === handle);
                    if (exists.length > 0) throw new Error("Handle taken");
                    const user = { 
                        handle, name, 
                        avatar: `https://api.dicebear.com/7.x/notionists/svg?seed=${handle}` 
                    };
                    return SQL_DB.insert('users', user);
                },
                '/posts': (method, payload) => {
                    if (method === 'GET') return SQL_DB.query('posts');
                    if (method === 'POST') return SQL_DB.insert('posts', payload);
                },
                '/users/search': (method, { q }) => {
                    return SQL_DB.query('users', u => 
                        u.name.toLowerCase().includes(q.toLowerCase()) || 
                        u.handle.toLowerCase().includes(q.toLowerCase())
                    );
                },
                '/users/stats': (method, { handle }) => {
                    const posts = SQL_DB.query('posts', p => p.authorHandle === handle);
                    return { postCount: posts.length };
                }
            }
        };

        /**
         * FRONTEND APPLICATION LOGIC
         */
        const state = {
            currentUser: JSON.parse(localStorage.getItem('tp_session')),
            isSignup: false,
            currentPostImage: null
        };

        const notify = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, 10px)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, 0)'; }, 3000);
        };

        const router = {
            navigate: async (view) => {
                document.getElementById('view-title').innerText = view === 'feed' ? 'Home Feed' : view;
                ['feed', 'profile', 'discover'].forEach(v => {
                    document.getElementById(`screen-${v}`).classList.toggle('hidden', v !== view);
                    const m = document.getElementById(`nav-m-${v}`);
                    const d = document.getElementById(`nav-d-${v}`);
                    if(m) { m.classList.toggle('nav-active', v === view); m.classList.toggle('text-slate-400', v !== view); }
                    if(d) { d.classList.toggle('nav-active', v === view); d.classList.toggle('text-indigo-600', v === view); }
                });

                if(view === 'feed') feedManager.render();
                if(view === 'profile') app.loadProfile();
            }
        };

        const app = {
            init: () => {
                SQL_DB.init();
                if(state.currentUser) {
                    document.getElementById('screen-auth').style.display = 'none';
                    document.getElementById('app-shell').classList.remove('hidden');
                    app.updateUI();
                    feedManager.render();
                }
            },
            updateUI: () => {
                const u = state.currentUser;
                document.getElementById('user-avatar-small').src = u.avatar;
                document.getElementById('composer-avatar').src = u.avatar;
                document.getElementById('profile-img').src = u.avatar;
                document.getElementById('profile-name').innerText = u.name;
                document.getElementById('profile-handle').innerText = `@${u.handle}`;
            },
            loadProfile: async () => {
                const stats = await MockServer.request('/users/stats', 'GET', { handle: state.currentUser.handle });
                document.getElementById('stat-posts').innerText = stats.postCount;
            },
            logout: () => {
                localStorage.removeItem('tp_session');
                location.reload();
            }
        };

        const feedManager = {
            createPost: async () => {
                const input = document.getElementById('post-input');
                const text = input.value.trim();
                if(!text && !state.currentPostImage) return;

                const payload = {
                    text,
                    image: state.currentPostImage,
                    author: state.currentUser.name,
                    authorHandle: state.currentUser.handle,
                    avatar: state.currentUser.avatar,
                    createdAt: Date.now(),
                    likes: 0
                };

                await MockServer.request('/posts', 'POST', payload);
                input.value = '';
                feedManager.clearImage();
                feedManager.render();
                notify("Post committed to SQL DB");
            },
            clearImage: () => {
                state.currentPostImage = null;
                document.getElementById('image-preview-container').classList.add('hidden');
                document.getElementById('post-image-input').value = '';
            },
            render: async () => {
                const posts = await MockServer.request('/posts', 'GET');
                const container = document.getElementById('feed-list');
                
                if(posts.length === 0) {
                    container.innerHTML = `<div class="py-20 text-center text-slate-300 font-bold italic">No records in tp_posts table.</div>`;
                    return;
                }

                container.innerHTML = posts.map(p => `
                    <div class="card p-6 rounded-[2.5rem] anim-slide-up flex flex-col space-y-4">
                        <div class="flex items-center space-x-3">
                            <img src="${p.avatar}" class="w-10 h-10 rounded-xl object-cover">
                            <div>
                                <h4 class="font-bold text-sm text-slate-900">${p.author}</h4>
                                <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">@${p.authorHandle}</p>
                            </div>
                        </div>
                        <p class="text-slate-600 leading-relaxed font-medium">${p.text}</p>
                        ${p.image ? `<img src="${p.image}" class="w-full rounded-2xl border border-slate-50 max-h-96 object-cover">` : ''}
                        <div class="flex items-center space-x-6 pt-4 border-t border-slate-50">
                            <button class="flex items-center space-x-2 text-slate-400"><i class="far fa-heart"></i><span class="text-xs font-bold">${p.likes}</span></button>
                            <button class="flex items-center space-x-2 text-slate-400"><i class="fas fa-code"></i><span class="text-[8px] font-mono">ID: ${p.id.toString().slice(-4)}</span></button>
                        </div>
                    </div>
                `).join('');
            }
        };

        // UI Handlers
        document.getElementById('form-auth').onsubmit = async (e) => {
            e.preventDefault();
            const handle = document.getElementById('input-email').value.trim().toLowerCase();
            const name = document.getElementById('input-name').value.trim();

            try {
                const endpoint = state.isSignup ? '/auth/register' : '/auth/login';
                const user = await MockServer.request(endpoint, 'POST', { handle, name });
                
                state.currentUser = user;
                localStorage.setItem('tp_session', JSON.stringify(user));
                app.init();
                notify(`Logged in as ${user.name}`);
            } catch (err) {
                notify(err.message);
            }
        };

        document.getElementById('btn-toggle-auth').onclick = () => {
            state.isSignup = !state.isSignup;
            document.getElementById('field-name').classList.toggle('hidden', !state.isSignup);
            document.getElementById('btn-auth-text').innerText = state.isSignup ? 'Register on Server' : 'Initialize Connection';
            document.getElementById('btn-toggle-auth').innerText = state.isSignup ? 'Existing Profile? Login' : 'New user? Register on Server';
        };

        document.getElementById('post-image-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.currentPostImage = ev.target.result;
                document.getElementById('post-image-preview').src = ev.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('search-input').oninput = async (e) => {
            const q = e.target.value;
            if (q.length < 1) return;
            const results = await MockServer.request('/users/search', 'GET', { q });
            document.getElementById('user-results').innerHTML = results.map(u => `
                <div class="card p-4 rounded-3xl flex items-center space-x-3">
                    <img src="${u.avatar}" class="w-10 h-10 rounded-xl">
                    <div>
                        <p class="font-bold text-sm">${u.name}</p>
                        <p class="text-[10px] text-slate-400">@${u.handle}</p>
                    </div>
                </div>
            `).join('');
        };

        document.getElementById('post-input').oninput = function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        };

        app.init();
    </script>
</body>
</html>
